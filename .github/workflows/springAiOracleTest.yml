# This workflow builds the ./spring-ai-oracle project with `mvn install`.

name: Run the tests for Spring AI Oracle

on:
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/springAiOracleTest.yml"
      - "spring-ai-oracle/**"
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/springAiOracleTest.yml"
      - "spring-ai-oracle/**"

permissions:
  contents: read

jobs:
  spring-ai-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Maven Build and Test
        working-directory: ./spring-ai-oracle
        run: |
          mvn clean install
